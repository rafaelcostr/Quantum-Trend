mode: backtest

exchange:
  id: binance
  symbol: BTC/USDT
  timeframe: 4h

strategy:
  name: pullback_short_v1
  params:
    ema_fast: 20
    ema_slow: 200
    warmup_bars: 210
    pullback_pct: 0.008
    min_adx: 20
    stop_atr_mult: 1.0
    target_atr_mult: 2.0
    adx_period: 14

risk:
  initial_capital: 10000.0
  risk_per_trade: 0.01
  max_open_positions: 1
  max_daily_drawdown: 0.03
  max_weekly_drawdown: 0.08

execution:
  fee_rate: 0.001
  slippage_rate: 0.0005
  entry_on_next_open: true

data:
  years: 0
  cache_dir: data/cache
