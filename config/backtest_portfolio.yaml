mode: backtest

exchange:
  id: binance
  symbol: BTC/USDT
  timeframe: 4h

strategy:
  name: portfolio_macro_micro_v1
  params:
    bb_period: 20
    bb_std: 2.0
    rsi_period: 14
    adx_period: 14
    mm20_period: 20
    mm200_period: 200
    warmup_bars: 205
    include_daily_macro: true
    daily_mm_period: 200
    sr_lookback: 100
    sr_touch_pct: 0.01
    micro_allocation: 0.30
    macro_allocation: 0.70
    range_adx_max: 25
    stop_pct: 0.025
    stop_below_mm200_pct: 0.02

risk:
  initial_capital: 10000.0
  sizing_mode: full_equity
  max_open_positions: 1
  max_daily_drawdown: 0.10
  max_weekly_drawdown: 0.20

execution:
  fee_rate: 0.001
  slippage_rate: 0.0005
  entry_on_next_open: true

data:
  years: 3
  cache_dir: data/cache
