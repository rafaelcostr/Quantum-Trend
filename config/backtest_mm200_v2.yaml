mode: backtest

exchange:
  id: binance
  symbol: BTC/USDT
  timeframe: 4h

strategy:
  name: mm200_trend_v2
  params:
    mm20_period: 20
    mm200_period: 200
    warmup_bars: 205
    stop_below_mm200_pct: 0.02

risk:
  initial_capital: 10000.0
  sizing_mode: full_equity
  max_open_positions: 1
  max_daily_drawdown: 0.10
  max_weekly_drawdown: 0.20

execution:
  fee_rate: 0.001
  slippage_rate: 0.0005
  entry_on_next_open: true

data:
  years: 3
  cache_dir: data/cache
