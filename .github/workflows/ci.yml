name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Prettier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install npm deps
        run: npm ci
      - name: Check formatting
        run: npm run format:check

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    needs: format
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install npm deps
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: TypeScript
        run: npx tsc --noEmit
      - name: Build
        run: npm run build

  backend:
    name: Backend
    runs-on: ubuntu-latest
    needs: format
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Python deps
        run: python -m pip install -e ".[dev]"
      - name: Pytest
        run: python -m pytest tests/ -q

  quality-gate:
    name: Quality gate
    runs-on: ubuntu-latest
    needs: [format, frontend, backend]
    steps:
      - name: Merge gate
        run: echo "All quality checks passed."
